<!DOCTYPE html>
<html>
<head>
    <title>Student To-Do List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>Student To-Do List</h1>

        <form action="/add" method="POST">
            <input type="text" name="task" placeholder="Enter a student task">
            <button type="submit">Add Task</button>
        </form>

        <h2>Tasks</h2>

        <ul>
            {% for task in tasks %}
                <li>
                    {% if task.completed %}
                        <span class="completed">{{ task.text }}</span>
                    {% else %}
                        <span>{{ task.text }}</span>
                    {% endif %}

                    <a href="/complete/{{ loop.index0 }}">Complete</a>
                    <a href="/delete/{{ loop.index0 }}">Delete</a>
                </li>
            {% else %}
                <p>No tasks added yet.</p>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
